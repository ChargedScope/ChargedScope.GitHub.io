const IMAGE_EXTENSIONS = [".png", ".jpg", ".jpeg", ".webp"];

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildChoices(correctAnswer) {
  const wrongPool = roadSignAnswers.filter((a) => a !== correctAnswer);
  const wrongChoices = shuffle(wrongPool).slice(0, 3);
  return shuffle([correctAnswer, ...wrongChoices]);
}

// ---------------------------------------------------------------
// 2. Photos are named "Screenshot YYYY-MM-DD HHMMSS.png" and taken in a
//    known time window. Since we can't list the folder (no directory
//    listing on this host), generate every possible timestamp in the
//    window, one per second, and check which files actually exist.
// ---------------------------------------------------------------
const SCREENSHOT_DATE = "2026-07-17";      // YYYY-MM-DD
const RANGE_START = "21:46:09";            // HH:MM:SS, first known screenshot
const RANGE_END = "22:11:50";              // HH:MM:SS, last known screenshot
const CONCURRENCY = 20;                    // parallel existence checks at a time

function pad2(n) {
  return n.toString().padStart(2, "0");
}

function buildCandidateFilenames() {
  const start = new Date(SCREENSHOT_DATE + "T" + RANGE_START);
  const end = new Date(SCREENSHOT_DATE + "T" + RANGE_END);

  const filenames = [];
  for (let t = new Date(start); t <= end; t.setSeconds(t.getSeconds() + 1)) {
    const hhmmss = pad2(t.getHours()) + pad2(t.getMinutes()) + pad2(t.getSeconds());
    filenames.push("Screenshot " + SCREENSHOT_DATE + " " + hhmmss + ".png");
  }
  return filenames;
}

async function fileExists(url) {
  try {
    const res = await fetch(url, { method: "HEAD" });
    return res.ok;
  } catch (err) {
    return false;
  }
}

// Checks candidate filenames CONCURRENCY at a time, in order, and returns
// the ones that actually exist (in the same, already-chronological order).
async function findExistingPhotos(candidates, onProgress) {
  const found = [];
  for (let i = 0; i < candidates.length; i += CONCURRENCY) {
    const batch = candidates.slice(i, i + CONCURRENCY);
    const results = await Promise.all(
      batch.map((name) => fileExists("photos/" + encodeURIComponent(name)))
    );
    batch.forEach((name, idx) => {
      if (results[idx]) found.push(name);
    });
    if (onProgress) onProgress(Math.min(i + CONCURRENCY, candidates.length), candidates.length);
  }
  return found;
}

async function loadPhotoList() {
  const container = document.getElementById("quizContainer");
  const candidates = buildCandidateFilenames();

  const filenames = await findExistingPhotos(candidates, (done, total) => {
    container.textContent = "Checking photos... (" + done + " / " + total + ")";
  });

  return filenames;
}

async function init() {
  const container = document.getElementById("quizContainer");

  let filenames;
  try {
    filenames = await loadPhotoList();
  } catch (err) {
    container.textContent = "Something went wrong while checking for photos.";
    return;
  }

  if (filenames.length === 0) {
    container.textContent = "No screenshots found in that time range.";
    return;
  }

  if (filenames.length > roadSignAnswers.length) {
    console.warn(
      "Found " + filenames.length + " photos but only " + roadSignAnswers.length +
      " answers. Extra photos beyond #" + roadSignAnswers.length + " will be ignored."
    );
  }

  const questions = filenames.slice(0, roadSignAnswers.length).map((name, i) => ({
    url: "photos/" + encodeURIComponent(name),
    answer: roadSignAnswers[i],
    choices: buildChoices(roadSignAnswers[i]),
  }));

  renderQuiz(questions);
}

init();

let currentQuestions = [];
let currentIndex = 0;
let score = 0;
let answered = false;

function renderQuiz(questions) {
  currentQuestions = questions;
  currentIndex = 0;
  score = 0;
  answered = false;
  showQuestion();
}

function showQuestion() {
  const container = document.getElementById("quizContainer");
  container.innerHTML = "";
  answered = false;

  const q = currentQuestions[currentIndex];

  const heading = document.createElement("h3");
  heading.textContent = "Question " + (currentIndex + 1) + " of " + currentQuestions.length;
  container.appendChild(heading);

  const img = document.createElement("img");
  img.src = q.url;
  img.width = 300;
  container.appendChild(img);
  container.appendChild(document.createElement("br"));

  q.choices.forEach((choice) => {
    const id = "choice_" + choice.replace(/\W+/g, "_");

    const input = document.createElement("input");
    input.type = "radio";
    input.name = "choice";
    input.value = choice;
    input.id = id;

    const label = document.createElement("label");
    label.setAttribute("for", id);
    label.appendChild(input);
    label.appendChild(document.createTextNode(" " + choice));

    container.appendChild(label);
    container.appendChild(document.createElement("br"));
  });

  const feedback = document.createElement("p");
  feedback.id = "feedback";
  container.appendChild(feedback);

  const btn = document.getElementById("submitBtn");
  btn.style.display = "inline";
  btn.textContent = "Submit Answer";
  btn.onclick = handleSubmitOrNext;

  document.getElementById("result").textContent = "";
}

function handleSubmitOrNext() {
  if (!answered) {
    const selected = document.querySelector('input[name="choice"]:checked');
    if (!selected) {
      alert("Pick an answer first.");
      return;
    }

    const q = currentQuestions[currentIndex];
    const correct = selected.value === q.answer;
    if (correct) score++;

    document.getElementById("feedback").textContent = correct
      ? "Correct!"
      : "Incorrect. The correct answer was: " + q.answer;

    answered = true;

    const btn = document.getElementById("submitBtn");
    btn.textContent =
      currentIndex < currentQuestions.length - 1 ? "Next Question" : "Finish";
  } else {
    currentIndex++;
    if (currentIndex < currentQuestions.length) {
      showQuestion();
    } else {
      document.getElementById("quizContainer").innerHTML = "";
      document.getElementById("submitBtn").style.display = "none";
      document.getElementById("result").textContent =
        "You got " + score + " out of " + currentQuestions.length + " correct.";
    }
  }
}
