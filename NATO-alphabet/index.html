<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NATO Alphabet Trainer</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #111;
        color: #eee;
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 60px;
    }
    #letter {
        font-size: 120px;
        margin-bottom: 20px;
    }
    input {
        font-size: 24px;
        padding: 10px;
        width: 300px;
        text-align: center;
    }
    #result {
        margin-top: 20px;
        font-size: 28px;
        height: 40px;
    }
</style>
</head>
<body>

<h1>NATO Alphabet Trainer</h1>
<div id="letter">A</div>

<input id="answer" placeholder="Type the NATO word..." autofocus>

<div id="result"></div>

<script>
const nato = {
    A: "ALPHA",
    B: "BRAVO",
    C: "CHARLIE",
    D: "DELTA",
    E: "ECHO",
    F: "FOXTROT",
    G: "GOLF",
    H: "HOTEL",
    I: "INDIA",
    J: "JULIETT",
    K: "KILO",
    L: "LIMA",
    M: "MIKE",
    N: "NOVEMBER",
    O: "OSCAR",
    P: "PAPA",
    Q: "QUEBEC",
    R: "ROMEO",
    S: "SIERRA",
    T: "TANGO",
    U: "UNIFORM",
    V: "VICTOR",
    W: "WHISKEY",
    X: "XRAY",
    Y: "YANKEE",
    Z: "ZULU"
};

const letterDiv = document.getElementById("letter");
const answerInput = document.getElementById("answer");
const resultDiv = document.getElementById("result");

function newLetter() {
    const letters = Object.keys(nato);
    const random = letters[Math.floor(Math.random() * letters.length)];
    letterDiv.textContent = random;
    answerInput.value = "";
    resultDiv.textContent = "";
}

answerInput.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        const user = answerInput.value.trim().toUpperCase();
        const correct = nato[letterDiv.textContent];

        if (user === correct) {
            resultDiv.textContent = "Correct!";
            resultDiv.style.color = "lime";
        } else {
            resultDiv.textContent = "Incorrect — " + correct;
            resultDiv.style.color = "red";
        }

        setTimeout(newLetter, 1000);
    }
});

newLetter();
</script>

</body>
</html>
